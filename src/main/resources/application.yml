spring:
  datasource:
    url: jdbc:sqlite:./data/family-repurchase.sqlite
    driver-class-name: org.sqlite.JDBC
  main:
    banner-mode: off

server:
  port: 8080

family-agent:
  allowed-data-dirs:
    - ./examples
    - ./data/inbox
  reports-dir: ./reports

# 价格判断阈值为可选配置，未配置时使用默认值
#  price-decision:
#    good-price-median-factor: 0.92
#    expensive-price-median-factor: 1.12

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha