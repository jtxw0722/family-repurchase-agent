spring:
  datasource:
    url: jdbc:sqlite:./data/family-repurchase.sqlite
    driver-class-name: org.sqlite.JDBC
  main:
    banner-mode: off
  config:
    import: optional:file:.env[.properties]

server:
  port: 8080

family-agent:
  reports-dir: ./reports
  normalization:
    llm:
      # 是否启用 LLM 规则维护建议
      enabled: true
      # LLM 服务提供方
      provider: openai-compatible
      # LLM 模型名称
      model: mimo-v2.5-pro
      # LLM API Key
      api-key: ${NORMALIZATION_LLM_API_KEY:}
      # LLM Base URL
      base-url: https://token-plan-cn.xiaomimimo.com/v1

      # LLM 最大输出 token 数；0 表示不传 max_tokens
      max-tokens: 0
      # Provider 专属扩展参数；为空表示使用 provider 默认行为
      extra-body-json: '{"temperature":0.8,"top_p":0.95,"thinking":{"type":"disabled"}}'
      # LLM 请求超时时间，单位秒
      request-timeout-seconds: 180

      # 是否生成 LLM debug dump 文件
      debug-log-enabled: true
      # LLM debug dump 文件目录
      debug-log-dir: logs/llm-debug
