spring:
  datasource:
    url: jdbc:sqlite:./data/family-repurchase.sqlite
    driver-class-name: org.sqlite.JDBC
  main:
    banner-mode: off

server:
  port: 8080

family-agent:
  allowed-data-dirs:
    - ./examples
    - ./data/inbox
  reports-dir: ./reports

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha