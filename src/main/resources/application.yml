spring:
  datasource:
    url: jdbc:sqlite:./data/family-repurchase.sqlite
    driver-class-name: org.sqlite.JDBC
  main:
    banner-mode: off
  config:
    import: optional:file:.env[.properties]

server:
  port: 8080

family-agent:
  reports-dir: ./reports
  llm:
    # 是否生成统一 LLM debug dump 文件，默认关闭；开启后 parse_order_image 和 normalization-rule-suggestions 都会写入
    debug-log-enabled: true
    # 统一 LLM debug dump 文件目录
    debug-log-dir: logs/llm-debug
  # 请求未提供 owner 时使用的订单归属人
  default-owner: jtxw
  parse-order-image:
    model:
      # 默认不向外部视觉模型发送订单截图；仅在用户显式配置后启用
      enabled: true
      provider: openai-compatible
      base-url: https://token-plan-cn.xiaomimimo.com/v1
      api-key: ${FAMILY_AGENT_PARSE_ORDER_IMAGE_MODEL_API_KEY:}
      model-name: mimo-v2.5
      timeout-seconds: 60
      fallback-to-local-ocr: true
      max-image-bytes: 10485760
    local-ocr:
      # 默认关闭本地 OCR；仅在用户明确配置本机命令后启用
      enabled: true
  normalization:
    llm:
      # 是否启用 LLM 规则维护建议
      enabled: true
      # LLM 服务提供方
      provider: openai-compatible
      # LLM 模型名称
      model: mimo-v2.5-pro
      # LLM API Key
      api-key: ${NORMALIZATION_LLM_API_KEY:}
      # LLM Base URL
      base-url: https://token-plan-cn.xiaomimimo.com/v1

      # LLM 最大输出 token 数；0 表示不传 max_tokens
      max-tokens: 0
      # Provider 专属扩展参数；为空表示使用 provider 默认行为
      extra-body-json: '{"temperature":0.8,"top_p":0.95,"thinking":{"type":"disabled"}}'
      # LLM 请求超时时间，单位秒
      request-timeout-seconds: 180
